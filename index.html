<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>VocalForge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{--bg:#fff;--tx:#111;--dm:#999;--bd:#e5e5e5;--sf:#fafafa;--sel:#111;--sel-tx:#fff}
body{font-family:'Helvetica Neue',Helvetica,-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;overflow-x:hidden}
.app{max-width:560px;margin:0 auto;padding:40px 24px 80px}

header{text-align:center;padding:0 0 48px}
header h1{font-size:15px;font-weight:400;letter-spacing:6px;text-transform:uppercase}
header p{color:var(--dm);font-size:11px;margin-top:4px;letter-spacing:2px}

.kd{text-align:center;margin-bottom:48px}
.kd .big{font-family:'Helvetica Neue',Helvetica,ui-monospace,monospace;font-size:72px;font-weight:200;letter-spacing:-2px;color:var(--tx);cursor:pointer;line-height:1}
.kd .sub{font-size:10px;color:var(--dm);margin-top:8px;letter-spacing:2px;text-transform:uppercase}

.st{font-size:9px;color:var(--dm);text-transform:uppercase;letter-spacing:3px;margin-bottom:12px}

.gr{display:flex;flex-direction:column;gap:1px;margin-bottom:40px}
.cd{background:var(--bg);border:1px solid var(--bd);padding:14px 16px;cursor:pointer;transition:all .15s}
.cd:first-child{border-radius:8px 8px 0 0}
.cd:last-child{border-radius:0 0 8px 8px}
.cd:not(:last-child){border-bottom:none}
.cd.sel{background:var(--sel);color:var(--sel-tx);border-color:var(--sel)}
.cd.sel .d{color:rgba(255,255,255,.5)}
.cd.sel .iv{color:rgba(255,255,255,.4)}
.cd .n{font-weight:500;font-size:13px;letter-spacing:.5px}
.cd .d{font-size:11px;color:var(--dm);margin-top:2px}
.cd .iv{font-family:ui-monospace,monospace;font-size:10px;color:var(--dm);margin-top:4px}

.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px}
.sr{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--dm);letter-spacing:1px;text-transform:uppercase}
.sr input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:1px;background:var(--bd);outline:none;border-radius:0}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--tx);cursor:pointer;border:none}
.sr .v{font-family:ui-monospace,monospace;font-size:12px;color:var(--tx);min-width:30px;text-align:right}
.ck{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dm);letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.ck input{accent-color:var(--tx);width:14px;height:14px}

.pa{text-align:center;margin:0}
.row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
.cb{width:44px;height:44px;border-radius:50%;border:1px solid var(--bd);background:var(--bg);color:var(--tx);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb:hover{background:var(--sf)}
.cb:active{background:var(--sel);color:var(--sel-tx)}

.pb{width:64px;height:64px;border-radius:50%;border:1.5px solid var(--tx);background:var(--bg);color:var(--tx);font-size:20px;cursor:pointer;transition:all .15s}
.pb:hover{background:var(--sf)}
.pb.on{background:var(--tx);color:var(--bg);animation:none}

.dots{display:flex;justify-content:center;gap:6px;margin-top:12px;flex-wrap:wrap}
.dt{width:5px;height:5px;border-radius:50%;background:var(--bd);transition:all .2s}
.dt.p{background:var(--dm)}
.dt.c{background:var(--tx);transform:scale(1.6)}
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>VocalForge</h1>
    <p>声乐练习</p>
  </header>
  <div class="kd"><div class="big" id="kd">C3</div><div class="sub">当前起始音</div></div>
  <div class="st">练习模式</div>
  <div class="gr" id="el"></div>
  <div class="controls">
    <div class="sr"><span>速度</span><input type="range" id="bs" min="40" max="200" value="100"><span class="v" id="bv">100</span></div>
  </div>
  <div class="pa">
    <div class="row" style="margin-bottom:16px">
      <button class="cb" id="kdn">&#8595;</button>
      <button class="pb" id="pb">&#9654;</button>
      <button class="cb" id="kup">&#8593;</button>
    </div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script>
// ============ iOS SILENT MODE BYPASS ============
// Route Web Audio through a MediaStream -> <audio> element
// iOS treats <audio>.srcObject playback as "media" category = ignores mute switch
var actx=null,streamDest=null,mediaEl=null;

function createCtx(){
  if(actx)return actx;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  // Create a MediaStream destination and wire it to an <audio> element
  if(actx.createMediaStreamDestination){
    streamDest=actx.createMediaStreamDestination();
    mediaEl=document.createElement('audio');
    mediaEl.srcObject=streamDest.stream;
    mediaEl.setAttribute('playsinline','');
  }
  return actx;
}

function ensureAudio(){
  if(!actx)createCtx();
  if(actx.state==='suspended')actx.resume();
  // Play the media element to activate "media playback" audio session
  if(mediaEl)mediaEl.play().catch(function(){});
}

// Re-wake audio on EVERY touch/click
document.addEventListener('touchend',function(){ensureAudio();});
document.addEventListener('click',function(){ensureAudio();});

// Keep alive every 20s
setInterval(function(){
  if(actx&&actx.state==='suspended')actx.resume();
  if(mediaEl&&mediaEl.paused)mediaEl.play().catch(function(){});
},20000);

// Re-wake when coming back to tab
document.addEventListener('visibilitychange',function(){
  if(!document.hidden){
    if(actx&&actx.state==='suspended')actx.resume();
    if(mediaEl&&mediaEl.paused)mediaEl.play().catch(function(){});
  }
});

// ============ SYNTH PIANO ============
function mf(m){return 440*Math.pow(2,(m-69)/12);}

var activeSounds=[];

function stopOldSounds(){
  var now=actx?actx.currentTime:0;
  while(activeSounds.length>1){
    var old=activeSounds.shift();
    try{
      old.gain.gain.cancelScheduledValues(now);
      old.gain.gain.setValueAtTime(old.gain.gain.value,now);
      old.gain.gain.exponentialRampToValueAtTime(0.001,now+0.05);
      old.nodes.forEach(function(n){try{n.stop(now+0.06);}catch(e){}});
      setTimeout(function(){try{old.gain.disconnect();}catch(e){}},100);
    }catch(e){}
  }
}

function playNote(midi,dur){
  if(!actx)createCtx();
  var ctx=actx;if(ctx.state==='suspended')ctx.resume();
  dur=dur||0.5;var now=ctx.currentTime,freq=mf(midi);
  stopOldSounds();

  var master=ctx.createGain();
  master.gain.setValueAtTime(0.001,now);
  master.gain.linearRampToValueAtTime(0.6,now+0.002);
  master.gain.exponentialRampToValueAtTime(0.35,now+0.05);
  master.gain.exponentialRampToValueAtTime(0.001,now+dur+0.3);
  master.connect(streamDest||ctx.destination);

  var nodes=[];

  var f1=ctx.createOscillator(),g1=ctx.createGain();
  f1.type='triangle';f1.frequency.value=freq;
  g1.gain.setValueAtTime(0.6,now);
  g1.gain.exponentialRampToValueAtTime(0.001,now+dur+0.2);
  f1.connect(g1);g1.connect(master);
  f1.start(now);f1.stop(now+dur+0.5);nodes.push(f1);

  var f2=ctx.createOscillator(),g2=ctx.createGain();
  f2.type='sine';f2.frequency.value=freq*2;
  g2.gain.setValueAtTime(0.12,now);
  g2.gain.exponentialRampToValueAtTime(0.001,now+dur+0.15);
  f2.connect(g2);g2.connect(master);
  f2.start(now);f2.stop(now+dur+0.3);nodes.push(f2);

  var f3=ctx.createOscillator(),g3=ctx.createGain();
  f3.type='sine';f3.frequency.value=freq*3;
  g3.gain.setValueAtTime(0.04,now);
  g3.gain.exponentialRampToValueAtTime(0.001,now+dur+0.1);
  f3.connect(g3);g3.connect(master);
  f3.start(now);f3.stop(now+dur+0.2);nodes.push(f3);

  var sound={gain:master,nodes:nodes,end:now+dur+0.5};
  activeSounds.push(sound);

  setTimeout(function(){
    var idx=activeSounds.indexOf(sound);
    if(idx>=0)activeSounds.splice(idx,1);
    try{master.disconnect();}catch(e){}
    nodes.forEach(function(n){try{n.disconnect();}catch(e){}});
  },(dur+3)*1000);
}

// ============ DATA ============
var NT=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function mn(m){return NT[m%12]+(Math.floor(m/12)-1)}

var EX=[
  {name:'1-3-5-3-1',desc:'大三和弦上下',iv:[0,4,7,4,0]},
  {name:'1-3-5-8-5-3-1',desc:'琶音上下行',iv:[0,4,7,12,7,4,0]},
  {name:'1-3-5-8-8-8-8-5-3-1',desc:'琶音+高音延留',iv:[0,4,7,12,12,12,12,7,4,0]}
];

var S={root:48,ex:0,bpm:100,auto:false,dir:'up',oct:2,playing:false,ni:-1,stop:false};

// ============ RENDER ============
function rc(){
  var el=document.getElementById('el'),h='';
  for(var i=0;i<EX.length;i++){
    var e=EX[i],ivs=[];
    for(var j=0;j<e.iv.length;j++)ivs.push(mn(S.root+e.iv[j]));
    h+='<div class="cd'+(i===S.ex?' sel':'')+'" data-i="'+i+'"><div class="n">'+e.name+'</div><div class="d">'+e.desc+'</div><div class="iv">'+ivs.join(' \u2192 ')+'</div></div>';
  }
  el.innerHTML=h;
  el.querySelectorAll('.cd').forEach(function(card){
    card.onclick=function(){S.ex=+this.dataset.i;rc();};
  });
}

function rd(len){
  var el=document.getElementById('dots');
  if(len<=0){el.innerHTML='';return;}
  var h='';for(var i=0;i<len;i++){var c='dt';if(i<S.ni)c+=' p';if(i===S.ni)c+=' c';h+='<div class="'+c+'"></div>';}
  el.innerHTML=h;
}
function uk(){document.getElementById('kd').textContent=mn(S.root);}

// ============ PLAYBACK ============
function sl(ms){return new Promise(function(r){setTimeout(r,ms);});}
async function go(){
  if(S.playing){S.stop=true;return;}
  S.stop=false;S.playing=true;
  var btn=document.getElementById('pb');btn.textContent='\u25A0';btn.classList.add('on');
  var ex=EX[S.ex],nd=60/S.bpm,sh=S.dir==='up'?1:-1;
  var rounds=1,sr=S.root;

  for(var r=0;r<rounds;r++){
    if(S.stop)break;var root=sr+r*sh;
    if(root<36||root>84)break;
    S.root=root;uk();rc();
    for(var i=0;i<ex.iv.length;i++){
      if(S.stop)break;
      S.ni=i;rd(ex.iv.length);
      playNote(root+ex.iv[i],nd*0.8);
      await sl(nd*1000);
    }
    if(!S.stop&&r<rounds-1){S.ni=-1;await sl(nd*400);}
  }
  S.playing=false;S.ni=-1;S.root=sr;uk();rc();rd(0);
  btn.textContent='\u25B6';btn.classList.remove('on');
}

// ============ EVENTS ============
function addTE(id,fn){
  var el=document.getElementById(id),moved=false;
  el.addEventListener('touchstart',function(){moved=false;},{passive:true});
  el.addEventListener('touchmove',function(){moved=true;},{passive:true});
  el.addEventListener('touchend',function(e){e.preventDefault();if(!moved)fn();},{passive:false});
  el.addEventListener('click',function(e){if(e.detail!==0)fn();});
}
addTE('kd',function(){playNote(S.root,0.5);});
addTE('kdn',function(){if(S.root>36){S.root--;uk();rc();playNote(S.root,.3);}});
addTE('kup',function(){if(S.root<84){S.root++;uk();rc();playNote(S.root,.3);}});
document.getElementById('bs').addEventListener('input',function(e){S.bpm=+e.target.value;document.getElementById('bv').textContent=S.bpm;});
addTE('pb',go);
uk();rc();
</script>
</body>
</html>
